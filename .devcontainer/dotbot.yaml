- defaults:
    link:
      ignore-missing: true
      relink: true

- clean: ['~']

- create:
    - ~/.config
    - ~/.config/fish
    - ~/.config/nvim
    - ~/.gemini
    - ~/.gemini/config
    - ~/.claude

- link:
    ~/.config/fish/config.fish: shell/fish/config.fish
    ~/.config/fish/functions: shell/fish/functions
    ~/.config/starship.toml: shell/starship.toml
    ~/.config/nvim/init.lua: editor/nvim/init.lua
    ~/.config/nvim/lua: editor/nvim/lua
    ~/.config/nvim/after: editor/nvim/after
    ~/.config/nvim/filetype.vim: editor/nvim/filetype.vim
    ~/.config/nvim/.prettierrc.yml: editor/nvim/.prettierrc.yml
    ~/AGENTS.md: agentic/AGENTS.md
    ~/.gemini/settings.json: agentic/.gemini/settings.json
    ~/.gemini/config/hooks.json: agentic/.gemini/config/hooks.json
    ~/.gemini/config/plugins: agentic/.gemini/config/plugins
    ~/.gemini/config/skills: agentic/.gemini/config/skills
    ~/.gemini/GEMINI.md: agentic/.gemini/GEMINI.md
    ~/.claude/CLAUDE.md: agentic/.claude/CLAUDE.md
